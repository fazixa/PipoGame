name: PipoGame
options:
  bundleIdPrefix: me.faeshayesteh
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ZQ3376B866
targets:
  PipoGame:
    type: application
    platform: iOS
    sources:
      - PipoGame
    info:
      path: PipoGame/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: Pipo needs the camera to see the world and stand in it.
        NSPhotoLibraryAddUsageDescription: Recordings of Pipo are saved to your Photos library.
        UIRequiredDeviceCapabilities: [arkit]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
